<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashStudy - AI-Powered Flashcards</title>
    <link rel="stylesheet" href="/frontend/css/styles.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="card auth-card">
            <h1>Flash<span style="color: var(--primary)">Study</span></h1>
            <p class="subtitle">AI-powered flashcards from your study materials</p>

            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">Log In</div>
                <div class="auth-tab" data-tab="register">Sign Up</div>
            </div>

            <div id="auth-error" class="auth-error"></div>

            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input id="login-username" type="text" class="form-control" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input id="login-password" type="password" class="form-control" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Log In</button>
            </form>

            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input id="reg-email" type="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="reg-username">Username</label>
                    <input id="reg-username" type="text" class="form-control" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input id="reg-password" type="password" class="form-control" placeholder="Create a password (min 6 chars)" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Create Account</button>
            </form>
        </div>
    </div>

    <script src="/frontend/js/api.js"></script>
    <script src="/frontend/js/auth.js"></script>
</body>
</html>
